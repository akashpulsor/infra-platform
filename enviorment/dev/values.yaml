# =============================================================================
# DEV ENVIRONMENT OVERRIDES
# =============================================================================

postgres:
  auth:
    postgresPassword: "postgres123"
    database: dalaillama

  databases:
    - tenant_db
    - product_db
    - billing_db
    - pbx-core_db

  persistence:
    size: 10Gi


redis:
  auth:
    enabled: true
    password: "redis123"

  persistence:
    size: 5Gi


kafka:
  kraft:
    clusterId: "MkU3OEVBNTcwNTJENDM2Qk"

  persistence:
    size: 10Gi


# =============================================================================
# SECRETS REFERENCES
# =============================================================================

secrets:
  postgres:
    name: postgres-secret
    passwordKey: postgres-password

  redis:
    name: redis-secret
    passwordKey: redis-password

  keycloak:
    name: dalai-backend-keycloak
    clientSecretKey: client-secret
    adminPasswordKey: admin-password

  didww:
    name: dalai-backend-didww
    apiKeyKey: api-key
    webhookSecretKey: webhook-secret

  razorpay:
    name: dalai-backend-razorpay
    keyIdKey: key-id
    keySecretKey: key-secret
    webhookSecretKey: webhook-secret