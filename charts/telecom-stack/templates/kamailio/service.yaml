# templates/kamailio/service.yaml

{{- if and .Values.kamailio.enabled (not .Values.kamailio.hostNetwork) }}
# NodePort/ClusterIP service — only when NOT using hostNetwork
apiVersion: v1
kind: Service
metadata:
  name: kamailio
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: kamailio
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  type: {{ .Values.kamailio.service.type }}
  selector:
    app: kamailio
  ports:
    - name: sip-udp
      port: {{ .Values.kamailio.service.sipUdpPort }}
      targetPort: 5060
      protocol: UDP
      {{- if eq .Values.kamailio.service.type "NodePort" }}
      nodePort: {{ .Values.kamailio.service.nodePortUdp }}
      {{- end }}
    - name: sip-tcp
      port: {{ .Values.kamailio.service.sipTcpPort }}
      targetPort: 5060
      protocol: TCP
      {{- if eq .Values.kamailio.service.type "NodePort" }}
      nodePort: {{ .Values.kamailio.service.nodePortTcp }}
      {{- end }}
    {{- if .Values.kamailio.tls.enabled }}
    - name: sip-tls
      port: {{ .Values.kamailio.service.sipTlsPort }}
      targetPort: 5061
      protocol: TCP
      {{- if eq .Values.kamailio.service.type "NodePort" }}
      nodePort: {{ .Values.kamailio.service.nodePortTls }}
      {{- end }}
    {{- end }}
    - name: sip-wss
      port: {{ .Values.kamailio.service.sipWssPort }}
      targetPort: {{ .Values.kamailio.service.sipWssPort }}
      protocol: TCP
      {{- if eq .Values.kamailio.service.type "NodePort" }}
      nodePort: {{ .Values.kamailio.service.nodePortWss }}
      {{- end }}
{{- end }}
---
{{- if and .Values.kamailio.enabled .Values.kamailio.hostNetwork }}
# Headless service for DNS when using hostNetwork
apiVersion: v1
kind: Service
metadata:
  name: kamailio
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: kamailio
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  clusterIP: None
  selector:
    app: kamailio
  ports:
    - name: sip-udp
      port: 5060
      protocol: UDP
    - name: sip-tcp
      port: 5060
      protocol: TCP
{{- end }}