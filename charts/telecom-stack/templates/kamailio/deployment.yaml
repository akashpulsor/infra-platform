# templates/kamailio/deployment.yaml

{{- if .Values.kamailio.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kamailio
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: kamailio
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.kamailio.replicaCount }}
  selector:
    matchLabels:
      app: kamailio
  template:
    metadata:
      labels:
        app: kamailio
        {{- include "telecom.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/kamailio/configmap.yaml") . | sha256sum }}
        sidecar.istio.io/inject: "false"
    spec:
      {{- include "telecom.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.kamailio.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      containers:
        - name: kamailio
          image: "{{ .Values.kamailio.image.repository }}:{{ .Values.kamailio.image.tag }}"
          imagePullPolicy: {{ .Values.kamailio.image.pullPolicy }}
          command: ["/bin/sh", "-c"]
          args:
            - |
              cp /etc/kamailio-cm/kamailio.cfg /etc/kamailio/kamailio.cfg
              sed -i "s|DBURL_PLACEHOLDER|postgres://$KAM_DB_USER:$KAM_DB_PASSWORD@$KAM_DB_HOST:$KAM_DB_PORT/$KAM_DB_NAME|g" /etc/kamailio/kamailio.cfg
              exec kamailio -DD -E -f /etc/kamailio/kamailio.cfg
          env:
            - name: KAM_DB_HOST
              value: "{{ .Values.kamailio.database.host }}"
            - name: KAM_DB_PORT
              value: "{{ .Values.kamailio.database.port }}"
            - name: KAM_DB_NAME
              value: "{{ .Values.kamailio.database.name }}"
            - name: KAM_DB_USER
              value: "{{ .Values.kamailio.database.user }}"
            - name: KAM_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.kamailio.database.secretName }}
                  key: {{ .Values.kamailio.database.secretKey }}
          ports:
            - name: sip-udp
              containerPort: 5060
              protocol: UDP
            - name: sip-tcp
              containerPort: 5060
              protocol: TCP
            {{- if .Values.kamailio.tls.enabled }}
            - name: sip-tls
              containerPort: 5061
              protocol: TCP
            {{- end }}
            - name: sip-wss
              containerPort: {{ .Values.kamailio.service.sipWssPort }}
              protocol: TCP
          volumeMounts:
            - name: kamailio-config
              mountPath: /etc/kamailio-cm
              readOnly: true
            {{- if .Values.kamailio.tls.enabled }}
            - name: tls-certs
              mountPath: /etc/kamailio/tls
              readOnly: true
            {{- end }}
          resources:
            {{- toYaml .Values.kamailio.resources | nindent 12 }}
          readinessProbe:
            exec:
              command: ["kamcmd", "core.version"]
            initialDelaySeconds: 10
            periodSeconds: 15
          livenessProbe:
            exec:
              command: ["kamcmd", "core.version"]
            initialDelaySeconds: 15
            periodSeconds: 20
      volumes:
        - name: kamailio-config
          configMap:
            name: kamailio-config
        {{- if .Values.kamailio.tls.enabled }}
        - name: tls-certs
          secret:
            secretName: {{ .Values.kamailio.tls.secretName }}
        {{- end }}
{{- end }}
