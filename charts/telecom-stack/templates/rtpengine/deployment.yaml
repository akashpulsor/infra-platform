# templates/rtpengine/deployment.yaml

{{- if .Values.rtpengine.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: rtpengine
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: rtpengine
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.rtpengine.replicaCount }}
  selector:
    matchLabels:
      app: rtpengine
  template:
    metadata:
      labels:
        app: rtpengine
        {{- include "telecom.labels" . | nindent 8 }}
      annotations:
        sidecar.istio.io/inject: "false"
    spec:
      {{- include "telecom.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.rtpengine.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      containers:
        - name: rtpengine
          image: "{{ .Values.rtpengine.image.repository }}:{{ .Values.rtpengine.image.tag }}"
          imagePullPolicy: {{ .Values.rtpengine.image.pullPolicy }}
          args:
            - rtpengine
            {{- if .Values.global.externalIp }}
            # Dual interface: internal for cluster, external for trunks/PSTN
            - --interface=internal/{{ .Values.rtpengine.interfaces.internal }}
            - --interface=external/{{ .Values.global.externalIp }}
            {{- else }}
            - --interface={{ .Values.rtpengine.interfaces.internal }}
            {{- end }}
            - --listen-ng=0.0.0.0:{{ .Values.rtpengine.service.ngPort }}
            - --port-min={{ .Values.rtpengine.portRange.min }}
            - --port-max={{ .Values.rtpengine.portRange.max }}
            {{- if .Values.rtpengine.recording.enabled }}
            - --recording-dir={{ .Values.rtpengine.recording.dir }}
            - --recording-method=pcap
            {{- end }}
            - --tos=184
            - --log-level=6
            - --delete-delay=0
            - --timeout=60
            - --silent-timeout=3600
            - --foreground
          ports:
            - name: ng-control
              containerPort: {{ .Values.rtpengine.service.ngPort }}
              protocol: UDP
          {{- if .Values.rtpengine.recording.enabled }}
          volumeMounts:
            - name: recordings
              mountPath: {{ .Values.rtpengine.recording.dir }}
          {{- end }}
          resources:
            {{- toYaml .Values.rtpengine.resources | nindent 12 }}
          securityContext:
            capabilities:
              add: ["NET_ADMIN"]
          readinessProbe:
            exec:
              #command: ["rtpengine-ctl", "-ip", "127.0.0.1", "-port", "{{ .Values.rtpengine.service.ngPort }}", "list", "totals"]
              command: ["sh", "-c", "pidof rtpengine"]
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            exec:
              #command: ["rtpengine-ctl", "-ip", "127.0.0.1", "-port", "{{ .Values.rtpengine.service.ngPort }}", "list", "totals"]
              command: ["sh", "-c", "pidof rtpengine"]
            initialDelaySeconds: 10
            periodSeconds: 15
      {{- if .Values.rtpengine.recording.enabled }}
      volumes:
        - name: recordings
          emptyDir: {}    # TODO: PVC or S3 sidecar for production
      {{- end }}
{{- end }}