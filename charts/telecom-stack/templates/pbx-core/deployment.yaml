# templates/pbx-core/deployment.yaml

{{- if .Values.pbxCore.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pbx-core
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: pbx-core
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.pbxCore.replicaCount }}
  selector:
    matchLabels:
      app: pbx-core
  template:
    metadata:
      labels:
        app: pbx-core
        {{- include "telecom.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/pbx-core/configmap.yaml") . | sha256sum }}
        sidecar.istio.io/inject: "true"
    spec:
      {{- include "telecom.imagePullSecrets" . | nindent 6 }}
      containers:
        - name: pbx-core
          image: "{{ .Values.pbxCore.image.repository }}:{{ .Values.pbxCore.image.tag }}"
          imagePullPolicy: {{ .Values.pbxCore.image.pullPolicy }}
          env:
            # Spring profile
            - name: SPRING_PROFILES_ACTIVE
              value: "k8s"

            # PostgreSQL (PBX-Core owns DB — Kamailio reads from it)
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://{{ .Values.pbxCore.database.host }}:{{ .Values.pbxCore.database.port }}/{{ .Values.pbxCore.database.name }}"
            - name: SPRING_DATASOURCE_USERNAME
              value: "{{ .Values.pbxCore.database.user }}"
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.pbxCore.database.secretName }}
                  key: {{ .Values.pbxCore.database.secretKey }}

            # Redis (Spring Boot 3.x property names)
            - name: SPRING_DATA_REDIS_HOST
              value: "{{ .Values.pbxCore.redis.host }}"
            - name: SPRING_DATA_REDIS_PORT
              value: "{{ .Values.pbxCore.redis.port }}"

            # FreeSWITCH ESL
            - name: FREESWITCH_ESL_HOST
              value: "freeswitch.{{ include "telecom.namespace" . }}.svc.cluster.local"
            - name: FREESWITCH_ESL_PORT
              value: "{{ .Values.freeswitch.service.eslPort }}"
            - name: FREESWITCH_ESL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.freeswitch.esl.secretName }}
                  key: {{ .Values.freeswitch.esl.secretKey }}

            # Kamailio (for kamcmd reload via K8s exec API)
            - name: KAMAILIO_NAMESPACE
              value: "{{ include "telecom.namespace" . }}"

            # CoTURN
            - name: COTURN_HOST
              value: "{{ .Values.coturn.realm }}"
            - name: COTURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.coturn.secretName }}
                  key: {{ .Values.coturn.secretKey }}

            # Platform identity
            - name: EXTERNAL_IP
              value: "{{ .Values.global.externalIp }}"
            - name: SIP_DOMAIN
              value: "{{ .Values.global.domain }}"

            # Subscription validation against production-service
            - name: SUBSCRIPTION_VALIDATION_URL
              value: "{{ .Values.pbxCore.subscriptionValidationUrl | default "http://production-service.platform.svc.cluster.local:8080/api/v1/subscriptions" }}"

            # AI Service
            - name: AI_SERVICE_WS_URL
              value: "ws://ai-service.{{ include "telecom.namespace" . }}.svc.cluster.local:{{ .Values.aiService.service.wsPort }}/audio"
            - name: AI_SERVICE_HTTP_URL
              value: "http://ai-service.{{ include "telecom.namespace" . }}.svc.cluster.local:{{ .Values.aiService.service.httpPort }}"
          ports:
            - name: http
              containerPort: {{ .Values.pbxCore.service.httpPort }}
              protocol: TCP
            - name: websocket
              containerPort: {{ .Values.pbxCore.service.wsPort }}
              protocol: TCP
          resources:
            {{- toYaml .Values.pbxCore.resources | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.pbxCore.service.httpPort }}
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: {{ .Values.pbxCore.service.httpPort }}
            initialDelaySeconds: 45
            periodSeconds: 15
{{- end }}