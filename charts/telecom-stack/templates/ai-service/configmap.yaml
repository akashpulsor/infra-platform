# templates/ai-service/configmap.yaml

{{- if .Values.aiService.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: ai-service-code
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: ai-service
    {{- include "telecom.labels" . | nindent 4 }}
data:
  requirements.txt: |
    websockets>=12.0
    aiohttp>=3.9.0

  server.py: |
    """
    Dalai LLAMA — AI Audio Processing Service (Dummy)
    
    Receives real-time audio from FreeSWITCH mod_audio_stream.
    Protocol:
      1. FreeSWITCH opens WS: ws://ai-service:8765/audio?tenant=X&call_id=Y
      2. Sends binary PCM frames (16-bit, 16kHz, mono)
      3. This service can send audio/events back
      4. Connection closes on call end
    """
    import asyncio
    import json
    import logging
    import os
    from urllib.parse import parse_qs, urlparse
    from datetime import datetime

    import websockets
    from aiohttp import web

    logging.basicConfig(level=logging.INFO, format='%(asctime)s [%(levelname)s] %(message)s')
    logger = logging.getLogger("ai-service")

    active_sessions = {}

    class AudioSession:
        def __init__(self, tenant_id, call_id, ws):
            self.tenant_id = tenant_id
            self.call_id = call_id
            self.ws = ws
            self.started_at = datetime.utcnow()
            self.frame_count = 0
            self.total_bytes = 0

        def to_dict(self):
            return {
                "tenant_id": self.tenant_id,
                "call_id": self.call_id,
                "started_at": self.started_at.isoformat(),
                "frames": self.frame_count,
                "bytes": self.total_bytes,
                "duration_s": (datetime.utcnow() - self.started_at).total_seconds()
            }

    async def handle_audio(websocket, path):
        parsed = urlparse(path)
        params = parse_qs(parsed.query)
        tenant_id = params.get("tenant", ["unknown"])[0]
        call_id = params.get("call_id", ["unknown"])[0]

        session = AudioSession(tenant_id, call_id, websocket)
        key = f"{tenant_id}:{call_id}"
        active_sessions[key] = session

        logger.info(f"NEW STREAM tenant={tenant_id} call={call_id}")

        try:
            async for msg in websocket:
                if isinstance(msg, bytes):
                    session.frame_count += 1
                    session.total_bytes += len(msg)

                    # ── PRODUCTION: Replace with STT → LLM → TTS pipeline ──
                    
                    if session.frame_count % 100 == 0:
                        dur = (datetime.utcnow() - session.started_at).total_seconds()
                        logger.info(f"[{tenant_id}:{call_id}] frames={session.frame_count} bytes={session.total_bytes} dur={dur:.1f}s")

                    # Dummy transcript every 500 frames
                    if session.frame_count % 500 == 0:
                        await websocket.send(json.dumps({
                            "type": "transcript",
                            "tenant_id": tenant_id,
                            "call_id": call_id,
                            "text": f"[Dummy STT] Processed {session.frame_count} frames",
                            "is_final": True,
                            "ts": datetime.utcnow().isoformat()
                        }))

                elif isinstance(msg, str):
                    try:
                        data = json.loads(msg)
                        logger.info(f"[{tenant_id}:{call_id}] control: {data.get('type', 'unknown')}")
                        if data.get("type") == "start":
                            await websocket.send(json.dumps({"type": "ready"}))
                        elif data.get("type") == "stop":
                            break
                    except json.JSONDecodeError:
                        pass

        except websockets.exceptions.ConnectionClosed as e:
            logger.info(f"[{tenant_id}:{call_id}] closed: {e.code}")
        except Exception as e:
            logger.error(f"[{tenant_id}:{call_id}] error: {e}")
        finally:
            dur = (datetime.utcnow() - session.started_at).total_seconds()
            logger.info(f"END STREAM [{tenant_id}:{call_id}] dur={dur:.1f}s frames={session.frame_count}")
            active_sessions.pop(key, None)

    # HTTP endpoints
    async def health(req):
        return web.json_response({"status": "healthy", "sessions": len(active_sessions)})

    async def sessions(req):
        return web.json_response({"sessions": [s.to_dict() for s in active_sessions.values()]})

    async def start_http():
        app = web.Application()
        app.router.add_get("/health", health)
        app.router.add_get("/sessions", sessions)
        runner = web.AppRunner(app)
        await runner.setup()
        port = int(os.getenv("HTTP_PORT", "8080"))
        await web.TCPSite(runner, "0.0.0.0", port).start()
        logger.info(f"HTTP on :{port}")

    async def main():
        ws_port = int(os.getenv("WS_PORT", "8765"))
        await websockets.serve(handle_audio, "0.0.0.0", ws_port, max_size=2**20, ping_interval=30)
        logger.info(f"WS on :{ws_port} — ws://0.0.0.0:{ws_port}/audio?tenant=X&call_id=Y")
        await start_http()
        await asyncio.Future()

    if __name__ == "__main__":
        asyncio.run(main())
{{- end }}