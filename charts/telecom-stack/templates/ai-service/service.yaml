# templates/ai-service/service.yaml

{{- if .Values.aiService.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: ai-service
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  type: {{ .Values.aiService.service.type }}
  selector:
    app: ai-service
  ports:
    - name: websocket
      port: {{ .Values.aiService.service.wsPort }}
      targetPort: {{ .Values.aiService.service.wsPort }}
      protocol: TCP
    - name: http
      port: {{ .Values.aiService.service.httpPort }}
      targetPort: {{ .Values.aiService.service.httpPort }}
      protocol: TCP
{{- end }}