{{- if .Values.pbxCore.enabled }}

# ──────────────────────────────────────────────
# ServiceEntry: Allow pbx-core → platform services
# (subscription validation + Keycloak JWT)
# ──────────────────────────────────────────────
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: platform-services-from-telecom
  namespace: {{ include "telecom.namespace" . }}
  labels:
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  hosts:
    - keycloak.{{ .Values.global.platformNamespace | default "platform" }}.svc.cluster.local
    - production-service.{{ .Values.global.platformNamespace | default "platform" }}.svc.cluster.local
  location: MESH_INTERNAL
  ports:
    - number: 8080
      name: http
      protocol: HTTP
    - number: 8443
      name: https
      protocol: HTTPS
  resolution: DNS
---
# ──────────────────────────────────────────────
# AuthorizationPolicy: Control access to PBX-Core
# ──────────────────────────────────────────────
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: pbx-core-access
  namespace: {{ include "telecom.namespace" . }}
  labels:
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: pbx-core
  rules:
    # Platform namespace → provisioning APIs (production-service calls PBX-Core)
    - from:
        - source:
            namespaces: ["{{ .Values.global.platformNamespace | default "platform" }}"]
      to:
        - operation:
            paths: ["/api/v1/provisioning/*"]
            methods: ["GET", "POST", "PUT", "DELETE"]

    # Telecom namespace → internal APIs (Kamailio, FreeSWITCH — no sidecar)
    - from:
        - source:
            namespaces: ["{{ include "telecom.namespace" . }}"]
      to:
        - operation:
            paths: ["/internal/*"]

    # Istio ingress → Agent/Supervisor/Admin UI APIs + WebSocket
    - from:
        - source:
            namespaces: ["istio-system"]
      to:
        - operation:
            paths:
              - "/api/v1/calls/*"
              - "/api/v1/agents/*"
              - "/api/v1/queues/*"
              - "/api/v1/routing/*"
              - "/api/v1/trunks/*"
              - "/api/v1/turn/*"
              - "/api/v1/supervisors/*"
              - "/ws/*"
---
# ──────────────────────────────────────────────
# PeerAuthentication: PBX-Core accepts both mTLS + plaintext
# (Kamailio/FreeSWITCH have no sidecar)
# ──────────────────────────────────────────────
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: pbx-core-mtls
  namespace: {{ include "telecom.namespace" . }}
  labels:
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: pbx-core
  mtls:
    mode: PERMISSIVE
---
# ──────────────────────────────────────────────
# PeerAuthentication: AI Service accepts plaintext from FreeSWITCH
# FreeSWITCH (istio:false) → AI Service (istio:true) would fail
# without PERMISSIVE because Envoy rejects non-mTLS connections
# ──────────────────────────────────────────────
{{- if .Values.aiService.enabled }}
apiVersion: security.istio.io/v1beta1
kind: PeerAuthentication
metadata:
  name: ai-service-mtls
  namespace: {{ include "telecom.namespace" . }}
  labels:
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: ai-service
  mtls:
    mode: PERMISSIVE
{{- end }}

{{- end }}