# templates/freeswitch/configmap.yaml

{{- if .Values.freeswitch.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: freeswitch-config
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: freeswitch
    {{- include "telecom.labels" . | nindent 4 }}
data:
  vars.xml: |
    <include>
      <X-PRE-PROCESS cmd="set" data="default_password=CHANGE_ME"/>
      <X-PRE-PROCESS cmd="set" data="domain={{ .Values.global.domain }}"/>
      <X-PRE-PROCESS cmd="set" data="hold_music=local_stream://moh"/>
      <X-PRE-PROCESS cmd="set" data="sound_prefix=$${sounds_dir}/en/us/callie"/>
      <X-PRE-PROCESS cmd="set" data="global_codec_prefs=OPUS,PCMU,PCMA"/>
      <X-PRE-PROCESS cmd="set" data="outbound_codec_prefs=OPUS,PCMU,PCMA"/>
      <!-- ESL password injected via env var at runtime, not hardcoded -->
      <X-PRE-PROCESS cmd="set" data="event_socket_password=$${env_ESL_PASSWORD}"/>
      <!-- AI Service WebSocket -->
      <X-PRE-PROCESS cmd="set" data="ai_ws_url={{ .Values.freeswitch.audioStream.aiServiceUrl }}"/>
    </include>

  event_socket.conf.xml: |
    <configuration name="event_socket.conf" description="Socket Client">
      <settings>
        <param name="nat-map" value="false"/>
        <param name="listen-ip" value="0.0.0.0"/>
        <param name="listen-port" value="{{ .Values.freeswitch.service.eslPort }}"/>
        <param name="password" value="$${event_socket_password}"/>
        <param name="apply-inbound-acl" value="any_v4.auto"/>
      </settings>
    </configuration>

  {{- if .Values.freeswitch.xmlCurl.enabled }}
  xml_curl.conf.xml: |
    <configuration name="xml_curl.conf" description="cURL XML Gateway">
      <bindings>
        <binding name="directory">
          <param name="gateway-url" value="{{ .Values.freeswitch.xmlCurl.directoryUrl }}" bindings="directory"/>
        </binding>
        <binding name="dialplan">
          <param name="gateway-url" value="{{ .Values.freeswitch.xmlCurl.dialplanUrl }}" bindings="dialplan"/>
        </binding>
      </bindings>
    </configuration>
  {{- end }}

  internal.xml: |
    <profile name="internal">
      <settings>
        <param name="context" value="multitenant"/>
        <param name="sip-ip" value="$${local_ip_v4}"/>
        <param name="sip-port" value="{{ .Values.freeswitch.service.sipPort }}"/>
        <param name="rtp-ip" value="$${local_ip_v4}"/>
        <param name="codec-prefs" value="$${global_codec_prefs}"/>
        <param name="inbound-codec-negotiation" value="generous"/>
        <!-- Multi-tenant: map registrations to correct domain -->
        <param name="force-register-domain" value="$${domain}"/>
        <param name="force-register-db-domain" value="$${domain}"/>
        <param name="challenge-realm" value="auto_from"/>
        <param name="apply-inbound-acl" value="any_v4.auto"/>
        <param name="enable-soa" value="false"/>
        <!-- Pass SIP headers from Kamailio through to dialplan -->
        <param name="pass-callee-id" value="false"/>
      </settings>
    </profile>

  multitenant_dialplan.xml: |
    <include>
      <context name="multitenant">
        <!-- Extract tenant from X-Tenant-ID header set by Kamailio -->
        <extension name="set_tenant" continue="false">
          <condition field="${sip_h_X-Tenant-ID}" expression="^(.+)$">
            <action application="set" data="tenant_id=$1"/>
            <action application="set" data="domain_name=$1"/>
            <action application="log" data="INFO [TENANT] tenant=${tenant_id} from=${caller_id_number} to=${destination_number}"/>
            <!-- AI audio stream is NOT started here.
                 PBX-Core controls this per-tenant via mod_xml_curl dialplan.
                 The dynamically fetched tenant_${tenant_id} context will include
                 audio_stream action only if tenant has AI enabled. -->
            <!-- Route to tenant-specific context (mod_xml_curl fetches from PBX-Core) -->
            <action application="transfer" data="${destination_number} XML tenant_${tenant_id}"/>
          </condition>
        </extension>

        <!-- Fallback: No X-Tenant-ID header — separate extension -->
        <extension name="no_tenant_fallback">
          <condition field="${sip_h_X-Tenant-ID}" expression="^$">
            <action application="log" data="WARNING No X-Tenant-ID header, using default context"/>
            <action application="transfer" data="${destination_number} XML default"/>
          </condition>
        </extension>
      </context>

      <!-- Default / test context -->
      <context name="default">
        <extension name="echo_test">
          <condition field="destination_number" expression="^9196$">
            <action application="answer"/>
            <action application="echo"/>
          </condition>
        </extension>

        <extension name="ai_test">
          <condition field="destination_number" expression="^9197$">
            <action application="answer"/>
            <action application="log" data="INFO [AI-TEST] Streaming audio to ${ai_ws_url}"/>
            {{- if .Values.freeswitch.audioStream.enabled }}
            <action application="audio_stream" data="${ai_ws_url}?tenant=test&call_id=${uuid} both 16000"/>
            {{- end }}
            <action application="playback" data="silence_stream://60000"/>
          </condition>
        </extension>

        <extension name="local_ext">
          <condition field="destination_number" expression="^(1\d{3})$">
            <action application="bridge" data="user/$1@${domain_name}"/>
          </condition>
        </extension>
      </context>
    </include>

  modules.conf.xml: |
    <configuration name="modules.conf" description="Modules">
      <modules>
                <!-- Logging -->
        <load module="mod_console"/>
        <load module="mod_logfile"/>
        <!-- Events -->
        <load module="mod_event_socket"/>
        <load module="mod_cdr_csv"/>
        <!-- Dialplan -->
        <load module="mod_dialplan_xml"/>
        {{- if .Values.freeswitch.xmlCurl.enabled }}
        <load module="mod_xml_curl"/>
        {{- end }}
        <!-- Endpoints -->
        <load module="mod_sofia"/>
        <load module="mod_loopback"/>
        <!-- Core apps -->
        <load module="mod_commands"/>
        <load module="mod_dptools"/>
        <load module="mod_db"/>
        <load module="mod_hash"/>
        <load module="mod_expr"/>
        <load module="mod_park"/>
        <load module="mod_record_session"/>
        <!-- Contact center -->
        <load module="mod_callcenter"/>
        <load module="mod_fifo"/>
        <load module="mod_conference"/>
        <load module="mod_voicemail"/>
        <load module="mod_directory"/>
        <load module="mod_httapi"/>
        <load module="mod_distributor"/>
        <load module="mod_avmd"/>
        <!-- Codecs -->
        <load module="mod_opus"/>
        <load module="mod_g711"/>
        <load module="mod_spandsp"/>
        <!-- Formats -->
        <load module="mod_sndfile"/>
        <load module="mod_native_file"/>
        <load module="mod_local_stream"/>
        <load module="mod_tone_stream"/>
        <!-- TTS / Say -->
        <load module="mod_flite"/>
        <load module="mod_say_en"/>
        <!-- Database -->
        <load module="mod_pgsql"/>
        <!-- AI Audio Streaming -->
        {{- if .Values.freeswitch.audioStream.enabled }}
        <load module="mod_audio_stream"/>
        {{- end }}
        <load module="mod_console"/>
        <load module="mod_logfile"/>
        <load module="mod_event_socket"/>
        <load module="mod_commands"/>
        <load module="mod_dptools"/>
        <load module="mod_dialplan_xml"/>
        {{- if .Values.freeswitch.xmlCurl.enabled }}
        <load module="mod_xml_curl"/>
        {{- end }}
        <load module="mod_sofia"/>
        <load module="mod_opus"/>
        <load module="mod_g711"/>
        <load module="mod_conference"/>
        <load module="mod_db"/>
        <load module="mod_hash"/>
        <load module="mod_park"/>
        <load module="mod_loopback"/>
        <load module="mod_sndfile"/>
        <load module="mod_native_file"/>
        <load module="mod_local_stream"/>
        <load module="mod_tone_stream"/>
        {{- if .Values.freeswitch.audioStream.enabled }}
        <load module="mod_audio_stream"/>
        {{- end }}
        <load module="mod_record_session"/>
      </modules>
    </configuration>
{{- end }}