{{- if .Values.coturn.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: coturn
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: coturn
    {{- include "telecom.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.coturn.replicaCount }}
  selector:
    matchLabels:
      app: coturn
  template:
    metadata:
      labels:
        app: coturn
        {{- include "telecom.labels" . | nindent 8 }}
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/coturn/configmap.yaml") . | sha256sum }}
        sidecar.istio.io/inject: "false"
    spec:
      {{- include "telecom.imagePullSecrets" . | nindent 6 }}
      {{- if .Values.coturn.hostNetwork }}
      hostNetwork: true
      dnsPolicy: ClusterFirstWithHostNet
      {{- end }}
      containers:
        - name: coturn
          image: "{{ .Values.coturn.image.repository }}:{{ .Values.coturn.image.tag }}"
          imagePullPolicy: {{ .Values.coturn.image.pullPolicy }}
          command: ["turnserver"]
          args:
            - "-c"
            - "/etc/coturn/turnserver.conf"
            - "--static-auth-secret=$(TURN_SECRET)"
          env:
            - name: TURN_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.coturn.secretName }}
                  key: {{ .Values.coturn.secretKey }}
          ports:
            - name: turn-udp
              containerPort: {{ .Values.coturn.service.turnPort }}
              protocol: UDP
            - name: turn-tcp
              containerPort: {{ .Values.coturn.service.turnPort }}
              protocol: TCP
            - name: turn-tls
              containerPort: {{ .Values.coturn.service.turnTlsPort }}
              protocol: TCP
          volumeMounts:
            - name: coturn-config
              mountPath: /etc/coturn/turnserver.conf
              subPath: turnserver.conf
          resources:
            {{- toYaml .Values.coturn.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: {{ .Values.coturn.service.turnPort }}
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: {{ .Values.coturn.service.turnPort }}
            initialDelaySeconds: 10
            periodSeconds: 15
      volumes:
        - name: coturn-config
          configMap:
            name: coturn-config
{{- end }}