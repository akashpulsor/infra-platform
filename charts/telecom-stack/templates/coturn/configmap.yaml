{{- if .Values.coturn.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: coturn-config
  namespace: {{ include "telecom.namespace" . }}
  labels:
    app: coturn
    {{- include "telecom.labels" . | nindent 4 }}
data:
  turnserver.conf: |
    listening-port={{ .Values.coturn.service.turnPort }}
    tls-listening-port={{ .Values.coturn.service.turnTlsPort }}
    min-port={{ .Values.coturn.relayPortRange.min }}
    max-port={{ .Values.coturn.relayPortRange.max }}
    fingerprint
    lt-cred-mech
    use-auth-secret
    realm={{ .Values.coturn.realm }}
    {{- if .Values.global.externalIp }}
    # CRITICAL: Without this, TURN advertises pod internal IP to browsers
    # Browsers get 10.x.x.x and media relay fails
    external-ip={{ .Values.global.externalIp }}
    {{- end }}
    log-file=stdout
    no-multicast-peers
    no-cli
    no-tlsv1
    no-tlsv1_1
    no-stun-backward-compatibility
    # Rate limiting for shared multi-tenant
    total-quota=100
    bps-capacity=0
    stale-nonce=600
    {{- if not .Values.global.externalIp }}
    # DEV ONLY: verbose logging when no external IP set
    verbose
    {{- end }}
{{- end }}