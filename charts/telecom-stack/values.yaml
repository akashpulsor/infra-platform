# ============================================================
# Dalai LLAMA — Telecom Stack Values
# ============================================================

global:
  imageRegistry: "akashtripathi"     # Match your platform registry
  imagePullSecrets: []
  namespace: telecom
  platformNamespace: apps            # Your platform namespace
  deploymentModel: shared            # shared | dedicated
  tenantId: ""
  domain: "sip.dalaillama.in"
  externalIp: ""                     # MUST set in prod (e.g. 203.0.113.10)

# ============================================================
# Kamailio — SIP Proxy & Router
# ============================================================
kamailio:
  enabled: true
  replicaCount: 1
  image:
    repository: ghcr.io/kamailio/kamailio
    tag: "5.7.4-bookworm"
    pullPolicy: IfNotPresent
  hostNetwork: false                 # true for production
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: NodePort
    sipUdpPort: 5060
    sipTcpPort: 5060
    sipTlsPort: 5061
    sipWssPort: 7443
    nodePortUdp: 30060
    nodePortTcp: 30061
    nodePortTls: 30062
    nodePortWss: 30443


  database:
      host: "postgres.apps.svc.cluster.local"
      port: 5432
      name: "pbx_core"
      user: "postgres"
      secretName: "postgres-secret"
      secretKey: "postgres-password"      
      
  tls:
    enabled: false
    secretName: "kamailio-tls"
  pbxCore:
    url: "http://pbx-core:8080"      # Same-namespace short name

# ============================================================
# FreeSWITCH — Media Server
# ============================================================
freeswitch:
  enabled: true
  replicaCount: 1
  image:
    repository: akashtripathi/dalaillama-freeswitch
    tag: "1.10-audiostream"
    pullPolicy: IfNotPresent
  hostNetwork: false                 # true for production
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  service:
    type: ClusterIP
    eslPort: 8021
    sipPort: 5080
    sipTlsPort: 5081
  esl:
    password: "ClueCon"
    secretName: "freeswitch-esl-credentials"
    secretKey: "password"
  xmlCurl:
    enabled: true
    # Same-namespace: no need for FQDN
    directoryUrl: "http://pbx-core:8080/internal/freeswitch/directory"
    dialplanUrl: "http://pbx-core:8080/internal/freeswitch/dialplan"
  audioStream:
    enabled: true
    aiServiceUrl: "ws://ai-service:8765/audio"

# ============================================================
# RTPEngine — Media Relay
# ============================================================
rtpengine:
  enabled: true
  replicaCount: 1
  image:
    repository: drachtio/rtpengine
    tag: "latest"
    pullPolicy: IfNotPresent
  hostNetwork: false                 # true for production (CRITICAL for RTP)
  resources:
    requests:
      cpu: 500m
      memory: 256Mi
    limits:
      cpu: "2"
      memory: 512Mi
  service:
    type: ClusterIP
    ngPort: 22222
  portRange:
    min: 20000
    max: 30000
  recording:
    enabled: true
    dir: "/var/spool/rtpengine"
  interfaces:
    internal: "eth0"

# ============================================================
# CoTURN — TURN/STUN for WebRTC NAT Traversal
# ============================================================
coturn:
  enabled: true
  replicaCount: 1
  image:
    repository: coturn/coturn
    tag: "latest"
    pullPolicy: IfNotPresent
  hostNetwork: false                 # true for production (relay ports 49152-65535)
  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: NodePort
    turnPort: 3478
    turnTlsPort: 5349
    nodePortTurn: 30478
    nodePortTurnTls: 30349
  realm: "turn.dalaillama.in"
  authSecret: "change-me-turn-secret"
  secretName: "coturn-auth-secret"
  secretKey: "secret"
  relayPortRange:
    min: 49152
    max: 65535

# ============================================================
# AI Service — Audio Processing (Dummy Pod)
# ============================================================
aiService:
  enabled: false
  replicaCount: 1
  image:
    repository: python
    tag: "3.11-slim"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 512Mi
  service:
    type: ClusterIP
    wsPort: 8765
    httpPort: 8080

# ============================================================
# PBX-Core — Central Telecom Intelligence
# ============================================================
pbxCore:
  enabled: false
  replicaCount: 1
  image:
    repository: akashtripathi/pbx-core
    tag: "latest"
    pullPolicy: IfNotPresent
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  service:
    type: ClusterIP
    httpPort: 8080
    wsPort: 8081
  database:
    host: "pbx-core-postgresql"      # Same-namespace short name
    port: 5432
    name: "pbx_core"
    user: "pbxcore"
    password: "change-me"
    secretName: "pbx-core-db-credentials"
    secretKey: "password"
  redis:
    host: "redis.apps.svc.cluster.local"   # Cross-namespace → needs FQDN
    port: 6379
  # Subscription validation against production-service in platform namespace
  subscriptionValidationUrl: "http://production-service.apps.svc.cluster.local:8080/api/v1/subscriptions"
