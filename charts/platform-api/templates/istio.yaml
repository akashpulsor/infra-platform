{{- if .Values.istio.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: {{ .Chart.Name }}
spec:
  hosts:
    - {{ .Values.istio.host | quote }}
  gateways:
    - {{ .Values.istio.gatewayName }}
  http:
    - route:
        - destination:
            host: {{ .Chart.Name }}
            port:
              number: {{ .Values.service.port }}
---
{{- if .Values.istio.jwt.enabled }}
apiVersion: security.istio.io/v1beta1
kind: RequestAuthentication
metadata:
  name: {{ .Chart.Name }}-jwt
spec:
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  jwtRules:
    - issuer: {{ .Values.istio.jwt.issuerUrl | quote }}
      jwksUri: {{ .Values.istio.jwt.jwksUri | quote }}
      forwardOriginalToken: true
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: {{ .Chart.Name }}-auth
spec:
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  action: ALLOW
  rules:
    - from:
        - source:
            requestPrincipals: ["*"]
    - to:
        - operation:
            paths: ["/actuator/health", "/actuator/info"]
{{- end }}
{{- end }}
