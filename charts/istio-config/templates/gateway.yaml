# gateway.yaml
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.gateway.name }}
  namespace: {{ .Values.gateway.namespace }}
  labels:
    {{- include "istio-config.labels" . | nindent 4 }}
    app.kubernetes.io/component: ingress
spec:
  selector:
    istio: ingressgateway
  servers:
    {{- if .Values.tls.enabled }}
    # HTTPS for development domains
    - port:
        number: 443
        name: https-dev
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.tls.certificates.dev.secretName }}
      hosts:
        - "{{ .Values.global.devDomain }}"
        - "*.{{ .Values.global.devDomain }}"
    {{- if .Values.tls.certificates.prod.enabled }}
    # HTTPS for production domain
    - port:
        number: 443
        name: https-prod
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: {{ .Values.tls.certificates.prod.secretName }}
      hosts:
        - "{{ .Values.global.productionDomain }}"
        - "*.{{ .Values.global.productionDomain }}"
    {{- end }}
    # HTTP 
    - port:
        number: {{ .Values.gateway.port }}
        name: http
        protocol: HTTP
      hosts:
        - "*"
      {{- if .Values.tls.httpsRedirect }}
      tls:
        httpsRedirect: true
      {{- end }}
    {{- else }}
    # HTTP only (no TLS)
    - port:
        number: {{ .Values.gateway.port }}
        name: http
        protocol: HTTP
      hosts:
        - "*"
    {{- end }}