# Separate Gateway for tenant UIs only.
# Does NOT touch central-gateway — no overwrite risk.
# Your central-gateway continues to handle platform routes (/dashboard, /api, etc.)
# Reconciler patches THIS gateway's hosts from DB.
apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: tenant-ui-gateway
  namespace: {{ .Values.global.namespace }}
  labels:
    managed-by: telecom-ui
spec:
  selector:
    istio: ingressgateway
  servers:
    - port:
        number: 443
        name: https-tenant-ui
        protocol: HTTPS
      tls:
        mode: SIMPLE
        credentialName: wildcard-dalaillama-cert
      hosts:
        {{- if .Values.tenants }}
        {{- range .Values.tenants }}
        {{- range $name, $app := $.Values.apps }}
        {{- if $app.enabled }}
        - "{{ $app.subdomain }}-{{ .slug }}.{{ $.Values.global.domain }}"
        {{- end }}
        {{- end }}
        {{- end }}
        {{- else }}
        - "admin-placeholder.{{ .Values.global.domain }}"
        {{- end }}