{{- range $name, $app := .Values.apps }}
{{- if $app.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    app: {{ $name }}
spec:
  replicas: {{ $app.replicaCount }}
  selector:
    matchLabels:
      app: {{ $name }}
  template:
    metadata:
      labels:
        app: {{ $name }}
        sidecar.istio.io/inject: "true"
    spec:
      containers:
        - name: {{ $name }}
          image: "{{ $app.image.repository }}:{{ $app.image.tag }}"
          imagePullPolicy: Always
          ports:
            - containerPort: 80
          env:
            - name: KEYCLOAK_BASE_URL
              value: {{ $.Values.global.keycloak.baseUrl | quote }}
            - name: KEYCLOAK_CLIENT_ID
              value: {{ $app.keycloakClientId | quote }}
            - name: API_BASE_URL
              value: {{ $.Values.global.apiBaseUrl | quote }}
            - name: APP_TYPE
              value: {{ $name | quote }}
          livenessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 10
          readinessProbe:
            httpGet:
              path: /health
              port: 80
            initialDelaySeconds: 5
          resources:
            {{- toYaml $app.resources | nindent 12 }}
          volumeMounts:
            - name: tenant-map
              mountPath: /etc/config
              readOnly: true
      volumes:
        - name: tenant-map
          configMap:
            name: tenant-map
            optional: true
{{- end }}
{{- end }}