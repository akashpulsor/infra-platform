# =============================================================================
# KEYCLOAK SECRETS
# Manages administrative, database, and client-level credentials
# =============================================================================

apiVersion: v1
kind: Secret
metadata:
  name: keycloak-admin-secret
  labels:
    app: keycloak
type: Opaque
stringData:
  # Used for initial admin login
  password: {{ .Values.auth.adminPassword | quote }}

---

{{- if .Values.database.enabled }}
apiVersion: v1
kind: Secret
metadata:
  name: keycloak-db-secret
  labels:
    app: keycloak
type: Opaque
stringData:
  # Credentials for Keycloak to connect to Postgres
  username: {{ .Values.database.username | quote }}
  password: {{ .Values.database.password | quote }}
{{- end }}

---

apiVersion: v1
kind: Secret
metadata:
  name: keycloak-client-secret
  labels:
    app: keycloak
type: Opaque
stringData:
  # This is the secret that will be injected into your client.json 
  # via the PLATFORM_API_SECRET environment variable
  client-secret: {{ .Values.keycloak.clientSecret | quote }}