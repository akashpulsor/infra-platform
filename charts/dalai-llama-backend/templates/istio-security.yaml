              - "/swagger-ui.html"
              - "/v3/api-docs*"
              - "/swagger-resources/*"
              - "/webjars/*"
    # Rule 3: Allow Internal Traffic & External Verified JWT Traffic
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Values.services.tenantService.namespace }}/sa/{{ .Values.services.tenantService.name }}"
              - "cluster.local/ns/{{ .Values.services.productService.namespace }}/sa/{{ .Values.services.productService.name }}"
              - "cluster.local/ns/{{ .Values.services.billingService.namespace }}/sa/{{ .Values.services.billingService.name }}"
        - source:
