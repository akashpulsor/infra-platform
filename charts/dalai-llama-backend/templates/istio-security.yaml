metadata:
  name: {{ .Values.services.billingService.name }}-jwt-auth
  namespace: {{ .Values.services.billingService.namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.services.billingService.name }}
  jwtRules:
    - issuer: "{{ .Values.keycloak.issuerUrl }}"
      jwksUri: {{ include "dalai-backend.jwksUri" . }}
      forwardOriginalToken: true
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.services.billingService.name }}-authz
  namespace: {{ .Values.services.billingService.namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.services.billingService.name }}
  action: ALLOW
  rules:
    # Rule 1: Allow CORS Preflight (OPTIONS) - Required for browser requests
    - to:
        - operation:
            methods: ["OPTIONS"]
    # Rule 2: Allow Public Endpoints (Health, Docs, Webhooks)
    - to:
        - operation:
            methods: ["GET", "POST"]
            paths:
              - "/actuator/*"
              - "/swagger-ui/*"
              - "/swagger-ui.html"
              - "/v3/api-docs*"
              - "/swagger-resources/*"
              - "/webjars/*"
              - "/webhooks/*"
    # Rule 3: Allow Internal Traffic & External Verified JWT Traffic
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Values.services.tenantService.namespace }}/sa/{{ .Values.services.tenantService.name }}"
              - "cluster.local/ns/{{ .Values.services.productService.namespace }}/sa/{{ .Values.services.productService.name }}"
              - "cluster.local/ns/{{ .Values.services.billingService.namespace }}/sa/{{ .Values.services.billingService.name }}"
        - source:
            requestPrincipals: ["{{ .Values.keycloak.issuerUrl }}/*"]
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
            paths: ["/api/*"]
{{- end }}
{{- end }}