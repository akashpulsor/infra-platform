# =============================================================================
# INFRASTRUCTURE - PeerAuthentication & AuthorizationPolicies
# These allow backend services to connect to postgres, redis, kafka
# =============================================================================

# -----------------------------------------------------------------------------
# POSTGRES - Disable mTLS for TCP protocol
# -----------------------------------------------------------------------------
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: postgres-disable-mtls
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      app: postgres
  mtls:
    mode: DISABLE
  portLevelMtls:
    5432:
      mode: DISABLE
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: postgres-allow-services
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    matchLabels:
      app: postgres
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.tenantService.name }}"
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.productService.name }}"
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.billingService.name }}"
      to:
        - operation:
            ports: ["5432"]
---
# -----------------------------------------------------------------------------
# REDIS - Disable mTLS for TCP protocol
# -----------------------------------------------------------------------------
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: redis-disable-mtls
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    matchLabels:
      app: redis
  mtls:
    mode: DISABLE
  portLevelMtls:
    6379:
      mode: DISABLE
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: redis-allow-services
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    matchLabels:
      app: redis
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.tenantService.name }}"
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.productService.name }}"
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.billingService.name }}"
      to:
        - operation:
            ports: ["6379"]
---
# -----------------------------------------------------------------------------
# KAFKA - Disable mTLS for TCP protocol
# -----------------------------------------------------------------------------
apiVersion: security.istio.io/v1
kind: PeerAuthentication
metadata:
  name: kafka-disable-mtls
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    matchLabels:
      app: kafka
  mtls:
    mode: DISABLE
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: kafka-allow-services
  namespace: {{ .Values.global.namespace }}
spec:
  selector:
    matchLabels:
      app: kafka
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.tenantService.name }}"
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.productService.name }}"
              - "cluster.local/ns/{{ .Values.global.namespace }}/sa/{{ .Values.services.billingService.name }}"
      to:
        - operation:
            ports: ["9092", "9093"]
---
# =============================================================================
# GATEWAY ACCESS - Allow Istio Ingress Gateway
# =============================================================================
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: allow-from-gateway
  namespace: {{ .Values.global.namespace }}
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            principals:
              - "cluster.local/ns/istio-system/sa/istio-ingressgateway-service-account"
---
# =============================================================================
# TENANT SERVICE - Security Policies
# =============================================================================
{{- if .Values.services.tenantService.enabled }}
{{- if .Values.services.tenantService.jwt.enabled }}
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ .Values.services.tenantService.name }}-jwt-auth
  namespace: {{ .Values.services.tenantService.namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.services.tenantService.name }}
  jwtRules:
    - issuer: "{{ .Values.keycloak.issuerUrl }}"
      jwksUri: {{ include "dalai-backend.jwksUri" . }}
      forwardOriginalToken: true
---
apiVersion: security.istio.io/v1
kind: AuthorizationPolicy
metadata:
  name: {{ .Values.services.tenantService.name }}-authz
  namespace: {{ .Values.services.tenantService.namespace }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.services.tenantService.name }}
  action: ALLOW
  rules:
    # Rule 1: Allow CORS Preflight (OPTIONS) - Required for browser requests
    - to:
        - operation:
            methods: ["OPTIONS"]
    # Rule 2: Allow Public Endpoints (Health, Docs)
    - to:
        - operation:
            methods: ["GET", "POST"]
            paths:
              - "/actuator/*"
              - "/swagger-ui/*"
              - "/swagger-ui.html"
              - "/v3/api-docs*"
              - "/swagger-resources/*"
              - "/webjars/*"
    # Rule 3: Allow Internal Traffic & External Verified JWT Traffic
    - from:
        - source:
            # Allow internal service accounts
            principals:
              - "cluster.local/ns/{{ .Values.services.tenantService.namespace }}/sa/{{ .Values.services.tenantService.name }}"
              - "cluster.local/ns/{{ .Values.services.productService.namespace }}/sa/{{ .Values.services.productService.name }}"
              - "cluster.local/ns/{{ .Values.services.billingService.namespace }}/sa/{{ .Values.services.billingService.name }}"
        - source:
            # Allow external traffic ONLY if JWT is valid
            requestPrincipals: ["{{ .Values.keycloak.issuerUrl }}/*"]
      to:
        - operation:
            methods: ["GET", "POST", "PUT", "DELETE", "PATCH"]
            paths: ["/api/*"]
{{- end }}
{{- end }}

---
