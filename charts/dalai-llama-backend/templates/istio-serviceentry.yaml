# =============================================================================
# SERVICE ENTRIES - External Services
# =============================================================================
# DIDWW API
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: didww-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
spec:
  hosts:
    - api.didww.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
---
# Razorpay API
{{- if .Values.services.billingService.razorpay.enabled }}
apiVersion: networking.istio.io/v1beta1
kind: ServiceEntry
metadata:
  name: razorpay-api
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
spec:
  hosts:
    - api.razorpay.com
  ports:
    - number: 443
      name: https
      protocol: HTTPS
  resolution: DNS
  location: MESH_EXTERNAL
{{- end }}