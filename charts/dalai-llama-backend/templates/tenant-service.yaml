{{- if .Values.services.tenantService.enabled }}

# =============================================================================
# TENANT SERVICE - VIRTUAL SERVICE
# =============================================================================
apiVersion: networking.istio.io/v1
kind: VirtualService
metadata:
  name: {{ .Values.services.tenantService.name }}
  namespace: {{ .Values.services.tenantService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
    app: {{ .Values.services.tenantService.name }}
spec:
  gateways:
    - istio-system/central-gateway
  hosts:
    - api.{{ .Values.global.domain }}
    - api.{{ .Values.global.devDomain }}
    {{- if .Values.global.production }}
    - api.{{ .Values.global.productionDomain }}
    {{- end }}
  http:
    # Actuator endpoints (no JWT required) - MUST come first
    - match:
        - uri:
            prefix: /actuator
      route:
        - destination:
            host: {{ .Values.services.tenantService.name }}.{{ .Values.services.tenantService.namespace }}.svc.cluster.local
            port:
              number: {{ .Values.services.tenantService.service.port }}
      timeout: 10s
    # Business API endpoints (JWT required)
    - match:
        - uri:
            prefix: /api/v1/tenants
      retries:
        attempts: 3
        perTryTimeout: 10s
      route:
        - destination:
            host: {{ .Values.services.tenantService.name }}.{{ .Values.services.tenantService.namespace }}.svc.cluster.local
            port:
              number: {{ .Values.services.tenantService.service.port }}
      timeout: 30s
---
# =============================================================================
# TENANT SERVICE - REQUEST AUTHENTICATION (JWT Validation)
# =============================================================================
apiVersion: security.istio.io/v1
kind: RequestAuthentication
metadata:
  name: {{ .Values.services.tenantService.name }}-jwt
  namespace: {{ .Values.services.tenantService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
    app: {{ .Values.services.tenantService.name }}
spec:
  selector:
    matchLabels:
      app: {{ .Values.services.tenantService.name }}
  jwtRules:
    - issuer: {{ .Values.keycloak.issuerUrl | quote }}
      jwksUri: {{ .Values.keycloak.jwksUri | quote }}
      forwardOriginalToken: true

# =============================================================================
# TENANT SERVICE - DEPLOYMENT
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.tenantService.name }}
  namespace: {{ .Values.services.tenantService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
    app: {{ .Values.services.tenantService.name }}
spec:
  replicas: {{ .Values.services.tenantService.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.services.tenantService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.tenantService.name }}
        app.kubernetes.io/part-of: dalai-llama-backend
        sidecar.istio.io/inject: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.services.tenantService.service.targetPort }}"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: {{ .Values.services.tenantService.name }}
      containers:
        - name: {{ .Values.services.tenantService.name }}
          image: "{{ .Values.global.image.registry }}/{{ .Values.services.tenantService.image.repository }}:{{ .Values.services.tenantService.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.tenantService.service.targetPort }}
              name: http
          env:
            # ===== Spring Profile =====
            {{- range $key, $value := .Values.services.tenantService.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            
            # ===== Database =====
            - name: DB_HOST
              value: "postgres.{{ .Values.global.namespace }}.svc.cluster.local"
            
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ .Values.services.tenantService.database.name }}
            - name: DB_USERNAME
              value: {{ .Values.services.tenantService.database.username }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgres.name }}
                  key: {{ .Values.secrets.postgres.passwordKey }}
            
            # ===== Redis =====
            - name: SPRING_DATA_REDIS_HOST
              value: redis.apps.svc.cluster.local

            - name: SPRING_DATA_REDIS_PORT
              value: "6379"

            - name: SPRING_DATA_REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: redis-secret
                  key: redis-password
            - name: REDIS_HOST
              value: "redis.{{ .Values.global.namespace }}.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.name }}
                  key: {{ .Values.secrets.redis.passwordKey }}
            
            # ===== Kafka =====
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.{{ .Values.global.namespace }}.svc.cluster.local:9092"
            
            # ===== Keycloak (OAuth2/JWT) =====
            - name: KEYCLOAK_ISSUER_URI
              value: {{ .Values.keycloak.issuerUrl }}
            
            # ===== Keycloak Admin Client =====
            - name: KEYCLOAK_ADMIN_URL
              value: {{ .Values.keycloak.adminUrl }}
            - name: KEYCLOAK_ADMIN_REALM
              value: {{ .Values.keycloak.adminRealm }}
            - name: KEYCLOAK_ADMIN_CLIENT_ID
              value: {{ .Values.keycloak.adminClientId }}
            - name: KEYCLOAK_ADMIN_USERNAME
              value: {{ .Values.keycloak.adminUsername }}
            - name: KEYCLOAK_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.keycloak.name }}
                  key: {{ .Values.secrets.keycloak.adminPasswordKey }}
            
            # ===== Kubernetes Client =====
            - name: KUBERNETES_NAMESPACE
              value: {{ .Values.services.tenantService.kubernetes.namespace | default "dalai-llama" }}
            - name: KUBERNETES_TRUST_CERTS
              value: "{{ .Values.services.tenantService.kubernetes.trustCerts | default true }}"
            
            # ===== Internal Service URLs =====
            - name: PRODUCT_SERVICE_URL
              value: "http://{{ .Values.services.productService.host }}"
            - name: BILLING_SERVICE_URL
              value: "http://{{ .Values.services.billingService.host }}"
            
            # ===== Provisioning =====
            - name: PROVISIONING_MAX_RETRIES
              value: "{{ .Values.services.tenantService.provisioning.maxRetries }}"
            - name: PROVISIONING_RETRY_DELAY_SECONDS
              value: "{{ .Values.services.tenantService.provisioning.retryDelaySeconds }}"
            - name: PROVISIONING_IP_WAIT_TIMEOUT_MINUTES
              value: "{{ .Values.services.tenantService.provisioning.ipWaitTimeoutMinutes }}"
            - name: PROVISIONING_IP_POLL_INTERVAL_SECONDS
              value: "{{ .Values.services.tenantService.provisioning.ipPollIntervalSeconds }}"
            - name: PROVISIONING_MIN_WALLET_BALANCE
              value: "{{ .Values.services.tenantService.provisioning.minWalletBalance }}"


# FIX STARTS HERE: Use the - name/value format
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUER_URI
              value: {{ .Values.keycloak.issuerUrl | quote }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_JWK_SET_URI
              value: {{ .Values.keycloak.jwksUri | quote }}

          livenessProbe:
            httpGet:
              path: {{ .Values.services.tenantService.health.path }}
              port: {{ .Values.services.tenantService.health.port }}
            initialDelaySeconds: 60
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.services.tenantService.health.path }}
              port: {{ .Values.services.tenantService.health.port }}
            initialDelaySeconds: 30
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.tenantService.resources | nindent 12 }}
---
# =============================================================================
# TENANT SERVICE - SERVICE
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.tenantService.name }}
  namespace: {{ .Values.services.tenantService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
    app: {{ .Values.services.tenantService.name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.tenantService.service.port }}
      targetPort: {{ .Values.services.tenantService.service.targetPort }}
      name: http
  selector:
    app: {{ .Values.services.tenantService.name }}
---
# =============================================================================
# TENANT SERVICE - SERVICE ACCOUNT
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.services.tenantService.name }}
  namespace: {{ .Values.services.tenantService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
---
# =============================================================================
# TENANT SERVICE - CLUSTER ROLE (for K8s provisioning)
# =============================================================================
{{- if .Values.rbac.create }}
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ .Values.services.tenantService.name }}-provisioner
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["configmaps", "secrets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["services", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets", "daemonsets"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.k8s.io"]
    resources: ["ingresses"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["networking.istio.io"]
    resources: ["virtualservices", "destinationrules", "gateways", "serviceentries", "envoyfilters"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
  - apiGroups: ["security.istio.io"]
    resources: ["authorizationpolicies", "peerauthentications", "requestauthentications"]
    verbs: ["get", "list", "watch", "create", "update", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ .Values.services.tenantService.name }}-provisioner
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ .Values.services.tenantService.name }}-provisioner
subjects:
  - kind: ServiceAccount
    name: {{ .Values.services.tenantService.name }}
    namespace: {{ .Values.services.tenantService.namespace }}
{{- end }}
---
# =============================================================================
# TENANT SERVICE - HPA
# =============================================================================
{{- if .Values.services.tenantService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.services.tenantService.name }}
  namespace: {{ .Values.services.tenantService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.services.tenantService.name }}
  minReplicas: {{ .Values.services.tenantService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.services.tenantService.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.services.tenantService.autoscaling.targetCPUUtilization }}
{{- end }}
{{- end }}