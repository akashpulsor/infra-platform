# =============================================================================
# SECRETS - Create these manually or via sealed-secrets/external-secrets
# =============================================================================
# This file documents the required secrets structure.
# In production, use sealed-secrets, external-secrets, or Vault.
# For development, create these secrets manually.
#
# kubectl create secret generic postgres-secret \
#   --from-literal=postgres-password=postgres123 \
#   -n apps
#
# kubectl create secret generic redis-secret \
#   --from-literal=redis-password=redis123 \
#   -n apps
#
# kubectl create secret generic dalai-backend-keycloak \
#   --from-literal=client-secret=your-client-secret \
#   --from-literal=admin-password=admin \
#   -n apps
#
# kubectl create secret generic dalai-backend-didww \
#   --from-literal=api-key=your-didww-api-key \
#   --from-literal=webhook-secret=your-didww-webhook-secret \
#   -n apps
#
# kubectl create secret generic dalai-backend-razorpay \
#   --from-literal=key-id=rzp_test_xxxxx \
#   --from-literal=key-secret=your-razorpay-secret \
#   --from-literal=webhook-secret=your-razorpay-webhook-secret \
#   -n apps
# =============================================================================

{{- if .Values.secrets }}
---
# PostgreSQL Secret (for development only - use sealed-secrets in prod)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.postgres.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.postgres.passwordKey }}: {{ .Values.postgres.auth.postgresPassword | quote }}
---
# Redis Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.redis.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.redis.passwordKey }}: {{ .Values.redis.auth.password | quote }}
---
# Keycloak Secret (placeholder - replace with actual values)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.keycloak.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.keycloak.clientSecretKey }}: "REPLACE_WITH_ACTUAL_CLIENT_SECRET"
  {{ .Values.secrets.keycloak.adminPasswordKey }}: "REPLACE_WITH_ACTUAL_ADMIN_PASSWORD"
---
# DIDWW Secret (placeholder - replace with actual values)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.didww.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.didww.apiKeyKey }}: "REPLACE_WITH_ACTUAL_DIDWW_API_KEY"
  {{ .Values.secrets.didww.webhookSecretKey }}: "REPLACE_WITH_ACTUAL_DIDWW_WEBHOOK_SECRET"
---
# Razorpay Secret (placeholder - replace with actual values)
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.razorpay.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
type: Opaque
stringData:
  {{ .Values.secrets.razorpay.keyIdKey }}: "REPLACE_WITH_ACTUAL_RAZORPAY_KEY_ID"
  {{ .Values.secrets.razorpay.keySecretKey }}: "REPLACE_WITH_ACTUAL_RAZORPAY_KEY_SECRET"
  {{ .Values.secrets.razorpay.webhookSecretKey }}: "REPLACE_WITH_ACTUAL_RAZORPAY_WEBHOOK_SECRET"
{{- end }}
