# =============================================================================
# SERVICE DESTINATION RULES - Standard HTTP with connection pooling
# =============================================================================
{{- if .Values.services.tenantService.enabled }}
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: {{ .Values.services.tenantService.name }}
  namespace: {{ .Values.services.tenantService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
spec:
  host: {{ .Values.services.tenantService.name }}.{{ .Values.services.tenantService.namespace }}.svc.cluster.local
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
      http:
        http1MaxPendingRequests: 100
        http2MaxRequests: 1000
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 30s
    tls:
      mode: ISTIO_MUTUAL
{{- end }}
---
