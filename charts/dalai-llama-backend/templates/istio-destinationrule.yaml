# =============================================================================
# INFRASTRUCTURE DESTINATION RULES - Disable mTLS for TCP protocols
# =============================================================================

# PostgreSQL - Disable mTLS
apiVersion: networking.istio.io/v1
kind: DestinationRule
metadata:
  name: postgres-disable-mtls
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
spec:
  host: postgres.{{ .Values.global.namespace }}.svc.cluster.local
  trafficPolicy:
    tls:
      mode: DISABLE
---
# Redis - Disable mTLS
