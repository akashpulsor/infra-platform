{{- if .Values.services.productService.enabled }}
# =============================================================================
# PRODUCT SERVICE - DEPLOYMENT
# =============================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Values.services.productService.name }}
  namespace: {{ .Values.services.productService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
    app: {{ .Values.services.productService.name }}
spec:
  replicas: {{ .Values.services.productService.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Values.services.productService.name }}
  template:
    metadata:
      labels:
        app: {{ .Values.services.productService.name }}
        app.kubernetes.io/part-of: dalai-llama-backend
        sidecar.istio.io/inject: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.services.productService.service.targetPort }}"
        prometheus.io/path: "/actuator/prometheus"
    spec:
      serviceAccountName: {{ .Values.services.productService.name }}
      containers:
        - name: {{ .Values.services.productService.name }}
          image: "{{ .Values.global.image.registry }}/{{ .Values.services.productService.image.repository }}:{{ .Values.services.productService.image.tag }}"
          imagePullPolicy: {{ .Values.global.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.services.productService.service.targetPort }}
              name: http
          env:
            # ===== Spring Profile =====
            {{- range $key, $value := .Values.services.productService.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
            
            # ===== Database =====
            - name: DB_HOST
              value: "postgres.{{ .Values.global.namespace }}.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ .Values.services.productService.database.name }}
            - name: DB_USERNAME
              value: {{ .Values.services.productService.database.username }}
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.postgres.name }}
                  key: {{ .Values.secrets.postgres.passwordKey }}
            
            # ===== Redis =====
            - name: REDIS_HOST
              value: "redis.{{ .Values.global.namespace }}.svc.cluster.local"
            - name: REDIS_PORT
              value: "6379"
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.redis.name }}
                  key: {{ .Values.secrets.redis.passwordKey }}
            
            # ===== Kafka =====
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: "kafka.{{ .Values.global.namespace }}.svc.cluster.local:9092"
            
            # ===== Keycloak (OAuth2/JWT) =====
            - name: KEYCLOAK_ISSUER_URI
              value: {{ .Values.keycloak.issuerUrl }}
            - name: KEYCLOAK_JWK_URI
              value: {{ .Values.keycloak.jwksUri }}
            
            # ===== SIP Configuration =====
            - name: SIP_DOMAIN
              value: {{ .Values.services.productService.sip.domain }}
            - name: SIP_REALM
              value: {{ .Values.services.productService.sip.realm }}
            
            # ===== DIDWW =====
            - name: DIDWW_API_URL
              value: {{ .Values.services.productService.didww.apiUrl }}
            - name: DIDWW_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.didww.name }}
                  key: {{ .Values.secrets.didww.apiKeyKey }}
            - name: DIDWW_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.didww.name }}
                  key: {{ .Values.secrets.didww.webhookSecretKey }}
            - name: DIDWW_SYNC_ENABLED
              value: "{{ .Values.services.productService.didww.syncEnabled }}"
            - name: DIDWW_SYNC_INTERVAL
              value: "{{ .Values.services.productService.didww.syncIntervalMinutes }}"
            
            # ===== Internal Service URLs =====
            - name: TENANT_SERVICE_URL
              value: "http://{{ .Values.services.tenantService.host }}"
            - name: BILLING_SERVICE_URL
              value: "http://{{ .Values.services.billingService.host }}"
            - name: SERVER_SERVLET_CONTEXT_PATH
              value: "/"


          securityContext:
            #runAsNonRoot: true
            {{- toYaml .Values.services.productService.securityContext | nindent 12 }}
          livenessProbe:
            httpGet:
              path: {{ .Values.services.productService.health.path }}
              port: {{ .Values.services.productService.health.port }}
            initialDelaySeconds: 120
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: {{ .Values.services.productService.health.path }}
              port: {{ .Values.services.productService.health.port }}
            initialDelaySeconds: 90
            periodSeconds: 5
            failureThreshold: 3
          resources:
            {{- toYaml .Values.services.productService.resources | nindent 12 }}
---
# =============================================================================
# PRODUCT SERVICE - SERVICE
# =============================================================================
apiVersion: v1
kind: Service
metadata:
  name: {{ .Values.services.productService.name }}
  namespace: {{ .Values.services.productService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
    app: {{ .Values.services.productService.name }}
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.services.productService.service.port }}
      targetPort: {{ .Values.services.productService.service.targetPort }}
      name: http
  selector:
    app: {{ .Values.services.productService.name }}
---
# =============================================================================
# PRODUCT SERVICE - SERVICE ACCOUNT
# =============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ .Values.services.productService.name }}
  namespace: {{ .Values.services.productService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
---
# =============================================================================
# PRODUCT SERVICE - HPA
# =============================================================================
{{- if .Values.services.productService.autoscaling.enabled }}
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ .Values.services.productService.name }}
  namespace: {{ .Values.services.productService.namespace }}
  labels:
    {{- include "dalai-backend.labels" . | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ .Values.services.productService.name }}
  minReplicas: {{ .Values.services.productService.autoscaling.minReplicas }}
  maxReplicas: {{ .Values.services.productService.autoscaling.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.services.productService.autoscaling.targetCPUUtilization }}
{{- end }}
{{- end }}
