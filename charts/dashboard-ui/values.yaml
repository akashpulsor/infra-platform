image:
  repository: akashtripathi/dashboard-ui
  tag: 2.1.5
  pullPolicy: Always

replicaCount: 1

service:
  port: 80

istio:
  enabled: true
  host: dalaillama-dev.local
  gatewayName: istio-system/central-gateway
  pathPrefix: /dashboard

keycloak:
  issuerUrl: "http://auth.localhost:8081/realms/dalai-llama"
  jwksUri: "http://keycloak.auth.svc.cluster.local/realms/dalai-llama/protocol/openid-connect/certs"


env:
  KEYCLOAK_URL: "http://auth.localhost:8081"
  KEYCLOAK_REALM: "dalai-llama"
  KEYCLOAK_CLIENT_ID: "platform-ui"
  PLATFORM_URL: "https://dalaillama-dev.local:8443/platform"
  DASHBOARD_APP_URL: "https://dalaillama-dev.local:8443/dashboard"
  API_BASE_URL: "https://api.dalaillama-dev.local:8443/api/v1"
  
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi