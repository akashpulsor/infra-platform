{{- if and .Values.enabled .Values.cluster.enabled (eq .Values.mode "cluster") }}
# =============================================================================
# REDIS CLUSTER MODE (Prod)
# =============================================================================
apiVersion: v1
kind: Secret
metadata:
  name: redis-secret
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
type: Opaque
stringData:
  redis-password: {{ .Values.auth.password | quote }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: redis-cluster-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
data:
  redis.conf: |
    bind 0.0.0.0
    port 6379
    
    # Cluster mode
    cluster-enabled yes
    cluster-config-file nodes.conf
    cluster-node-timeout 5000
    
    # Authentication
    {{- if .Values.auth.enabled }}
    requirepass {{ .Values.auth.password }}
    masterauth {{ .Values.auth.password }}
    {{- end }}
    
    # Persistence
    appendonly yes
    appendfsync everysec
    
    # Memory
    maxmemory 500mb
    maxmemory-policy allkeys-lru
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: redis
      name: redis
    - port: 16379
      targetPort: 16379
      name: cluster-bus
  selector:
    app: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: redis
      name: redis
    - port: 16379
      targetPort: 16379
      name: cluster-bus
  selector:
    app: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: {{ .Release.Namespace }}
  labels:
    app: redis
spec:
  serviceName: redis-headless
  replicas: {{ .Values.cluster.replicaCount }}
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
        - name: redis
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command:
            - redis-server
            - /etc/redis/redis.conf
          ports:
            - containerPort: 6379
              name: redis
            - containerPort: 16379
              name: cluster-bus
          volumeMounts:
            - name: data
              mountPath: /data
            - name: config
              mountPath: /etc/redis
          resources:
            {{- toYaml .Values.cluster.resources | nindent 12 }}
          livenessProbe:
            exec:
              command:
                - redis-cli
                {{- if .Values.auth.enabled }}
                - -a
                - {{ .Values.auth.password }}
                {{- end }}
                - ping
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - redis-cli
                {{- if .Values.auth.enabled }}
                - -a
                - {{ .Values.auth.password }}
                {{- end }}
                - ping
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: config
          configMap:
            name: redis-cluster-config
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.cluster.persistence.size }}
{{- end }}