# PostgreSQL Infrastructure Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.postgres.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: postgres
    part-of: dalai-infra
type: Opaque
stringData:
  {{ .Values.secrets.postgres.passwordKey }}: {{ .Values.postgres.auth.postgresPassword | quote }}

---

# Redis Infrastructure Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.redis.name }}
  namespace: {{ .Values.global.namespace }}
  labels:
    app: redis
    part-of: dalai-infra
type: Opaque
stringData:
  {{ .Values.secrets.redis.passwordKey }}: {{ .Values.redis.auth.password | quote }}

