# PostgreSQL Infrastructure Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.postgres.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    # This forces the secret to be created BEFORE the subcharts initialize
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    app: postgres
    part-of: dalai-infra
type: Opaque
stringData:
  {{ .Values.secrets.postgres.passwordKey }}: {{ .Values.postgres.auth.postgresPassword | quote }}

---

# Redis Infrastructure Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ .Values.secrets.redis.name }}
  namespace: {{ .Values.global.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
    "helm.sh/hook-delete-policy": before-hook-creation
  labels:
    app: redis
    part-of: dalai-infra
type: Opaque
stringData:
  {{ .Values.secrets.redis.passwordKey }}: {{ .Values.redis.auth.password | quote }}