{{- if and .Values.enabled .Values.cluster.enabled (eq .Values.mode "cluster") }}
# =============================================================================
# KAFKA CLUSTER MODE (Prod) - KRaft Multi-Node
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-cluster-config
  namespace: {{ .Release.Namespace }}
  labels:
    app: kafka
data:
  server.properties.template: |
    # KRaft Settings (NODE_ID will be replaced)
    process.roles=broker,controller
    node.id=NODE_ID
    controller.quorum.voters=1@kafka-0.kafka-headless:9093,2@kafka-1.kafka-headless:9093,3@kafka-2.kafka-headless:9093
    controller.listener.names=CONTROLLER
    
    # Listeners
    listeners=PLAINTEXT://:9092,CONTROLLER://:9093
    advertised.listeners=PLAINTEXT://POD_NAME.kafka-headless:9092
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    inter.broker.listener.name=PLAINTEXT
    
    # Log settings
    log.dirs=/var/lib/kafka/data
    num.partitions=3
    default.replication.factor={{ .Values.cluster.defaultReplicationFactor }}
    min.insync.replicas={{ .Values.cluster.minInsyncReplicas }}
    
    # Retention
    log.retention.hours=168
    log.retention.bytes=10737418240
    log.segment.bytes=1073741824
    
    # Performance
    num.network.threads=8
    num.io.threads=16
    socket.send.buffer.bytes=102400
    socket.receive.buffer.bytes=102400
    socket.request.max.bytes=104857600
    
    # Group coordinator
    group.initial.rebalance.delay.ms=3000
    offsets.topic.replication.factor={{ .Values.cluster.defaultReplicationFactor }}
    transaction.state.log.replication.factor={{ .Values.cluster.defaultReplicationFactor }}
    transaction.state.log.min.isr={{ .Values.cluster.minInsyncReplicas }}
---
apiVersion: v1
kind: Service
metadata:
  name: kafka
  namespace: {{ .Release.Namespace }}
  labels:
    app: kafka
spec:
  type: ClusterIP
  ports:
    - port: {{ .Values.service.port }}
      targetPort: kafka
      name: kafka
  selector:
    app: kafka
---
apiVersion: v1
kind: Service
metadata:
  name: kafka-headless
  namespace: {{ .Release.Namespace }}
  labels:
    app: kafka
spec:
  type: ClusterIP
  clusterIP: None
  ports:
    - port: {{ .Values.service.port }}
      targetPort: kafka
      name: kafka
    - port: {{ .Values.service.controllerPort }}
      targetPort: controller
      name: controller
  selector:
    app: kafka
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: kafka
  namespace: {{ .Release.Namespace }}
  labels:
    app: kafka
spec:
  serviceName: kafka-headless
  replicas: {{ .Values.cluster.replicaCount }}
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app: kafka
  template:
    metadata:
      labels:
        app: kafka
    spec:
      initContainers:
        - name: kafka-init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - bash
            - -c
            - |
              # Extract node ID from pod name (kafka-0 -> 1, kafka-1 -> 2, etc.)
              NODE_ID=$((${HOSTNAME##*-} + 1))
              
              # Generate server.properties
              sed "s/NODE_ID/$NODE_ID/g; s/POD_NAME/$HOSTNAME/g" \
                /etc/kafka-template/server.properties.template > /etc/kafka/server.properties
              
              # Format storage if not done
              if [ ! -f /var/lib/kafka/data/meta.properties ]; then
                /opt/kafka/bin/kafka-storage.sh format -t {{ .Values.kraft.clusterId }} -c /etc/kafka/server.properties
              fi
          env:
            - name: HOSTNAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: config-template
              mountPath: /etc/kafka-template
            - name: config
              mountPath: /etc/kafka
      containers:
        - name: kafka
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          command:
            - /opt/kafka/bin/kafka-server-start.sh
            - /etc/kafka/server.properties
          ports:
            - containerPort: 9092
              name: kafka
            - containerPort: 9093
              name: controller
          env:
            - name: KAFKA_HEAP_OPTS
              value: "-Xmx2G -Xms2G"
          volumeMounts:
            - name: data
              mountPath: /var/lib/kafka/data
            - name: config
              mountPath: /etc/kafka
          resources:
            {{- toYaml .Values.cluster.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 60
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 30
            periodSeconds: 5
      volumes:
        - name: config-template
          configMap:
            name: kafka-cluster-config
        - name: config
          emptyDir: {}
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        {{- if .Values.persistence.storageClass }}
        storageClassName: {{ .Values.persistence.storageClass }}
        {{- end }}
        resources:
          requests:
            storage: {{ .Values.cluster.persistence.size }}
{{- end }}