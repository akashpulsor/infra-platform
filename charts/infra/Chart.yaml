apiVersion: v2
name: dalai-llama-infra
description: Dalai LLAMA Backend Services - Tenant, Product, and Billing
type: application
version: 1.0.0
appVersion: "1.0.0"

keywords:
  - infra

maintainers:
  - name: Akash
    email: akash@dalaillama.in

dependencies:
  - name: postgres
    version: 1.0.0
    repository: file://charts/infra/postgres
    condition: postgres.enabled

  - name: redis
    version: 1.0.0
    repository: file://charts/infra/redis
    condition: redis.enabled

  - name: kafka
    version: 1.0.0
    repository: file://charts/infra/kafka
    condition: kafka.enabled