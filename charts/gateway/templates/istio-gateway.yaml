{{- if .Values.istio.enabled }}

apiVersion: networking.istio.io/v1beta1
kind: Gateway
metadata:
  name: {{ .Values.istio.gatewayName }}
  namespace: istio-system

spec:
  selector:
    istio: ingressgateway

  servers:
  - port:
      number: 80
      name: http
      protocol: HTTP
    hosts:
{{- range .Values.istio.hosts }}
      - {{ . }}
{{- end }}

{{- end }}