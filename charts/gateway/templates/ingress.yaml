{{- if .Values.ingress.enabled }}

{{- range $name, $svc := .Values.ingress.services }}
{{- if $svc.enabled }}

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ $name }}-ingress
  namespace: {{ $svc.namespace }}
  annotations:
    kubernetes.io/ingress.class: {{ $.Values.ingress.className }}

spec:
  rules:
  - host: {{ $svc.host }}
    http:
      paths:
      {{- range $path := $svc.paths }}
      - path: {{ $path.path }}
        pathType: {{ default "Prefix" $path.pathType }}
        backend:
          service:
            name: {{ $path.serviceName | default $svc.serviceName }}
            port:
              number: {{ $path.servicePort | default $svc.servicePort }}
      {{- end }}

{{- end }}
{{- end }}

{{- end }}