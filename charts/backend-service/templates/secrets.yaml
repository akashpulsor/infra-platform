# 1. THIRD-PARTY & INFRA MAPPING SECRETS
{{- range $secretKey, $secretConfig := .Values.secrets }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $secretConfig.name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" $ | nindent 4 }}
type: Opaque
stringData:


  {{- if eq $secretKey "didww" }}
  {{ $secretConfig.apiKeyKey }}: {{ $secretConfig.values.apiKey | quote }}
  {{ $secretConfig.webhookSecretKey }}: {{ $secretConfig.values.webhookSecret | quote }}
  {{- end }}
  {{- if eq $secretKey "razorpay" }}
  {{ $secretConfig.keyIdKey }}: {{ $secretConfig.values.keyId | quote }}
  {{ $secretConfig.keySecretKey }}: {{ $secretConfig.values.keySecret | quote }}
  {{ $secretConfig.webhookSecretKey }}: {{ $secretConfig.values.webhookSecret | quote }}
  {{- end }}
{{- end }}

# 2. SERVICE-SPECIFIC DATABASE SECRETS (Non-Root Users)
{{- range $serviceName, $serviceConfig := .Values.services }}
{{- if and $serviceConfig.enabled $serviceConfig.database }}
---
apiVersion: v1
kind: Secret
metadata:
  name: {{ $serviceConfig.name }}-db-secret
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "dalai-backend.labels" $ | nindent 4 }}
    service: {{ $serviceConfig.name }}
type: Opaque
stringData:
  # These pull from your service-specific values
  username: {{ $serviceConfig.database.username | quote }}
  password: {{ $serviceConfig.database.password | quote }}
{{- end }}
{{- end }}