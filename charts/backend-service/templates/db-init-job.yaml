apiVersion: batch/v1
kind: Job
metadata:
  name: {{ .Chart.Name }}-db-init
  namespace: {{ .Values.global.namespace }}
  annotations:
    # This ensures the job runs before the application pods start
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "1"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      containers:
      - name: psql-client
        image: postgres:15-alpine
        command:
        - /bin/sh
        - -c
        - |
          {{- range $serviceName, $serviceConfig := .Values.services }}
          {{- if and $serviceConfig.enabled $serviceConfig.database }}
          echo "Processing {{ $serviceName }}..."
          psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --host "$DB_HOST" <<-EOSQL
            DO \$$
            BEGIN
                IF NOT EXISTS (SELECT FROM pg_catalog.pg_roles WHERE rolname = '{{ $serviceConfig.database.username }}') THEN
                    CREATE ROLE {{ $serviceConfig.database.username }} WITH LOGIN PASSWORD '{{ $serviceConfig.database.password }}';
                END IF;
            END
            \$$;
            
            SELECT 'CREATE DATABASE {{ $serviceConfig.database.name }}'
            WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = '{{ $serviceConfig.database.name }}')\gexec
            
            GRANT ALL PRIVILEGES ON DATABASE {{ $serviceConfig.database.name }} TO {{ $serviceConfig.database.username }};
            ALTER DATABASE {{ $serviceConfig.database.name }} OWNER TO {{ $serviceConfig.database.username }};
          EOSQL
          {{- end }}
          {{- end }}
        env:
        - name: DB_HOST
          value: "postgres-service.{{ .Values.global.namespace }}.svc.cluster.local"
        - name: POSTGRES_USER
          value: "postgres"
        - name: PGPASSWORD
          valueFrom:
            secretKeyRef:
              name: {{ .Values.infra_secrets.postgres.name }}
              key: {{ .Values.infra_secrets.postgres.passwordKey }}
      restartPolicy: OnFailure
  backoffLimit: 4