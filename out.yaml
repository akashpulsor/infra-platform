# Source: dalai-llama-backend/charts/kafka/templates/standalone.yaml
apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-init-scripts
  labels:
    app: kafka
data:
  create-topics.sh: |
    #!/bin/bash
    set -e
    
    echo "Waiting for Kafka to be ready..."
    sleep 45
    echo "Creating topic: tenant.state.changed"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic tenant.state.changed \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: tenant.created"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic tenant.created \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: tenant.deleted"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic tenant.deleted \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: tenant.activated"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic tenant.activated \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: tenant.suspended"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic tenant.suspended \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: product.plan.assigned"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic product.plan.assigned \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: product.plan.changed"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic product.plan.changed \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: product.did.purchased"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic product.did.purchased \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: product.did.provisioned"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic product.did.provisioned \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: product.did.released"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic product.did.released \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: billing.wallet.created"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic billing.wallet.created \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: billing.wallet.funded"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic billing.wallet.funded \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: billing.wallet.low"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic billing.wallet.low \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: billing.state.changed"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic billing.state.changed \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: billing.payment.received"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic billing.payment.received \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: billing.cdr.rated"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic billing.cdr.rated \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: cdr.completed"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic cdr.completed \
      --partitions 10 \
      --replication-factor 1 || true
    echo "Creating topic: provisioning.step.completed"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic provisioning.step.completed \
      --partitions 3 \
      --replication-factor 1 || true
    echo "Creating topic: provisioning.failed"
    kafka-topics --bootstrap-server localhost:9092 \
      --create --if-not-exists \
      --topic provisioning.failed \
      --partitions 3 \
      --replication-factor 1 || true
    
    echo "All topics created successfully"
    
    # Keep container running
    tail -f /dev/null
