# Source: dalai-llama-backend/charts/postgres/templates/standalone.yaml
# =============================================================================
# POSTGRESQL STANDALONE MODE (Dev)
# =============================================================================
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgres-init
  namespace: apps
  labels:
    app: postgres
data:
  init-databases.sh: |
    #!/bin/bash
    set -e
    echo "Creating database: tenant_db"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE tenant_db;
      GRANT ALL PRIVILEGES ON DATABASE tenant_db TO $POSTGRES_USER;
    EOSQL
    echo "Creating database: product_db"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE product_db;
      GRANT ALL PRIVILEGES ON DATABASE product_db TO $POSTGRES_USER;
    EOSQL
    echo "Creating database: billing_db"
    psql -v ON_ERROR_STOP=1 --username "$POSTGRES_USER" --dbname "$POSTGRES_DB" <<-EOSQL
      CREATE DATABASE billing_db;
      GRANT ALL PRIVILEGES ON DATABASE billing_db TO $POSTGRES_USER;
    EOSQL
    
    echo "All databases created successfully"
